<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Evalify AI - Faculty Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#4cd7f6",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "surface-bright": "#f7f9fb",
                        "on-secondary-fixed": "#25005a",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-background": "#191c1e",
                        "on-primary-fixed": "#000d60",
                        "on-error": "#ffffff",
                        "primary": "#2036bd",
                        "secondary-container": "#8a4cfc",
                        "surface-dim": "#d8dadc",
                        "outline-variant": "#c5c5d7",
                        "background": "#f7f9fb",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-primary-fixed-variant": "#1d34ba",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#acedff",
                        "surface": "#f7f9fb",
                        "tertiary": "#00505f",
                        "surface-container-high": "#e6e8ea",
                        "primary-fixed": "#dfe0ff",
                        "surface-tint": "#3b4fd2",
                        "surface-variant": "#e0e3e5",
                        "inverse-primary": "#bbc3ff",
                        "on-surface-variant": "#454654",
                        "on-primary-container": "#d7daff",
                        "surface-container": "#eceef0",
                        "on-tertiary-fixed": "#001f26",
                        "surface-container-highest": "#e0e3e5",
                        "inverse-on-surface": "#eff1f3",
                        "on-tertiary-container": "#94e8ff",
                        "secondary-fixed-dim": "#d2bbff",
                        "on-error-container": "#93000a",
                        "outline": "#757686",
                        "secondary-fixed": "#eaddff",
                        "primary-fixed-dim": "#bbc3ff",
                        "on-surface": "#191c1e",
                        "on-secondary-container": "#fffbff",
                        "on-primary": "#ffffff",
                        "primary-container": "#3e52d5",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#006a7c",
                        "secondary": "#712ae2",
                        "inverse-surface": "#2d3133"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-bg {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .ai-glow-subtle {
            box-shadow: 0 0 40px rgba(113, 42, 226, 0.08);
        }
        .atmospheric-shadow {
            box-shadow: 0 12px 40px rgba(25, 28, 30, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary/10">
<!-- Subtle AI-Themed Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] right-[-20%] w-[80%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-10%] w-[60%] h-[50%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[420px] space-y-10">
<!-- Header / Brand -->
<header class="text-center space-y-3">
<div class="flex justify-center mb-6">
<div class="p-3 rounded-xl bg-primary-container text-on-primary-container ai-glow-subtle">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-primary">Evalify AI</h1>
<p class="text-on-surface-variant font-medium">Precision Grading. AI Intelligence.</p>
</header>
<!-- Form Card -->
<section class="bg-surface-container-lowest rounded-[1rem] p-8 atmospheric-shadow border border-outline-variant/15">
<form class="space-y-6">
<!-- Institutional Email -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface uppercase tracking-wider ml-1" for="email">Institutional Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 text-sm font-medium transition-all placeholder:text-outline/60" id="email" placeholder="julian.vane@university.edu" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/40 text-sm font-medium transition-all placeholder:text-outline/60" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-primary text-on-primary font-headline font-bold rounded-lg hover:bg-gradient-to-r hover:from-primary hover:to-primary-container transition-all active:scale-[0.98] atmospheric-shadow" type="submit">
                    Log in
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-[1px] bg-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-surface-container-lowest px-4 text-on-surface-variant font-medium uppercase tracking-widest">or continue with</span>
</div>
</div>
<!-- SSO / LMS Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors group">
<div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-sm text-[#4285F4]">school</span>
</div>
<span class="text-xs font-bold text-on-surface">Canvas</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low rounded-lg hover:bg-surface-container-high transition-colors group">
<div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-sm text-[#003366]">account_balance</span>
</div>
<span class="text-xs font-bold text-on-surface">Moodle</span>
</button>
</div>
</section>
<!-- Footer Info -->
<footer class="text-center space-y-4">
<p class="text-sm text-on-surface-variant">
                Don't have an institutional account? <br/>
<a class="text-primary font-bold hover:underline" href="#">Contact Faculty Admin</a>
</p>
<div class="flex items-center justify-center gap-6 text-[10px] font-bold text-outline uppercase tracking-widest pt-4">
<a class="hover:text-on-surface transition-colors" href="#">Privacy</a>
<span class="w-1 h-1 rounded-full bg-outline-variant/40"></span>
<a class="hover:text-on-surface transition-colors" href="#">Terms</a>
<span class="w-1 h-1 rounded-full bg-outline-variant/40"></span>
<a class="hover:text-on-surface transition-colors" href="#">Security</a>
</div>
</footer>
</main>
<!-- Optional Floating Decorative Card (Bento/Editorial style) -->
<div class="fixed bottom-8 right-8 hidden lg:block">
<div class="glass-bg p-6 rounded-2xl w-64 atmospheric-shadow border border-white/40">
<div class="flex items-center gap-3 mb-4">
<div class="p-2 bg-secondary/10 rounded-lg">
<span class="material-symbols-outlined text-secondary text-xl">auto_graph</span>
</div>
<span class="text-xs font-bold text-on-surface-variant uppercase">New Insight</span>
</div>
<p class="text-sm font-medium text-on-surface">AI grading now supports handwritten analysis for STEM exams.</p>
</div>
</div>
</body></html>
